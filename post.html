<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>maycommit</title>
  <link rel="stylesheet" href="style.css">
  <!-- KaTeX -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css">
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/auto-render.min.js"></script>
  <!-- Mermaid -->
  <script src="https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js"></script>
  <!-- Marked (markdown parser) -->
  <script src="https://cdn.jsdelivr.net/npm/marked@14/marked.min.js"></script>
  <!-- Highlight.js -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11/styles/github.min.css">
  <script src="https://cdn.jsdelivr.net/npm/highlight.js@11/lib/core.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/highlight.js@11/lib/languages/python.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/highlight.js@11/lib/languages/javascript.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/highlight.js@11/lib/languages/bash.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/highlight.js@11/lib/languages/java.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/highlight.js@11/lib/languages/go.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/highlight.js@11/lib/languages/sql.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/highlight.js@11/lib/languages/yaml.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/highlight.js@11/lib/languages/json.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/highlight.js@11/lib/languages/rust.min.js"></script>
</head>
<body>
  <header>
    <h1><a href="/">maycommit</a></h1>
  </header>
  <main>
    <article>
      <div class="post-meta" id="meta"></div>
      <div class="post-content" id="content">Carregando...</div>
    </article>
  </main>
  <footer><a href="/">&larr; voltar</a></footer>

  <script>
    mermaid.initialize({ startOnLoad: false, theme: 'neutral' });

    marked.use({
      renderer: {
        code({ text, lang }) {
          if (lang === 'mermaid') {
            return `<div class="mermaid">${text}</div>`;
          }
          if (lang && hljs.getLanguage(lang)) {
            const highlighted = hljs.highlight(text, { language: lang }).value;
            return `<pre><code class="hljs language-${lang}">${highlighted}</code></pre>`;
          }
          const escaped = text.replace(/</g, '&lt;').replace(/>/g, '&gt;');
          return `<pre><code>${escaped}</code></pre>`;
        }
      }
    });

    function parseFrontMatter(md) {
      const match = md.match(/^---\n([\s\S]*?)\n---\n([\s\S]*)$/);
      if (!match) return { meta: {}, body: md };
      const meta = {};
      match[1].split('\n').forEach(line => {
        const i = line.indexOf(':');
        if (i > 0) meta[line.slice(0, i).trim()] = line.slice(i + 1).trim();
      });
      return { meta, body: match[2] };
    }

    const file = new URLSearchParams(location.search).get('p');
    if (file) {
      fetch('posts/' + file)
        .then(r => { if (!r.ok) throw new Error(); return r.text(); })
        .catch(() => {
          document.getElementById('content').textContent = 'Post não encontrado.';
          return null;
        })
        .then(md => {
          if (!md) return;
          const { meta, body } = parseFrontMatter(md);
          if (meta.title) document.title = meta.title + ' — maycommit';
          document.getElementById('meta').textContent = [meta.date, meta.title].filter(Boolean).join(' · ');
          document.getElementById('content').innerHTML = marked.parse(body);

          // Render mermaid diagrams
          mermaid.run({ querySelector: '.mermaid' }).catch(() => {});

          // Render KaTeX math
          renderMathInElement(document.getElementById('content'), {
            delimiters: [
              { left: '$$', right: '$$', display: true },
              { left: '$', right: '$', display: false },
              { left: '\\[', right: '\\]', display: true },
              { left: '\\(', right: '\\)', display: false }
            ],
            throwOnError: false
          });
        });
    }
  </script>
</body>
</html>
