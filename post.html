<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>maycommit</title>
  <link rel="stylesheet" href="style.css">
  <!-- KaTeX -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css">
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/auto-render.min.js"></script>
  <!-- Mermaid -->
  <script src="https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js"></script>
  <!-- Marked (markdown parser) -->
  <script src="https://cdn.jsdelivr.net/npm/marked@14/marked.min.js"></script>
  <!-- Highlight.js (browser-ready cdn-assets package) -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@highlightjs/cdn-assets@11/styles/github.min.css">
  <script src="https://cdn.jsdelivr.net/npm/@highlightjs/cdn-assets@11/highlight.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@highlightjs/cdn-assets@11/languages/python.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@highlightjs/cdn-assets@11/languages/javascript.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@highlightjs/cdn-assets@11/languages/bash.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@highlightjs/cdn-assets@11/languages/java.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@highlightjs/cdn-assets@11/languages/go.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@highlightjs/cdn-assets@11/languages/sql.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@highlightjs/cdn-assets@11/languages/yaml.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@highlightjs/cdn-assets@11/languages/json.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@highlightjs/cdn-assets@11/languages/rust.min.js"></script>
  <!-- Function Plot (math graphing) -->
  <script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/function-plot@1/dist/function-plot.js"></script>
</head>
<body>
  <header>
    <h1><a href="/">maycommit</a></h1>
  </header>
  <main>
    <article>
      <div class="post-meta" id="meta"></div>
      <div class="post-content" id="content">Loading...</div>
    </article>
  </main>
  <footer><a href="/">&larr; back</a></footer>

  <script>
    mermaid.initialize({ startOnLoad: false, theme: 'neutral' });

    marked.use({
      renderer: {
        code({ text, lang }) {
          if (lang === 'mermaid') {
            return `<div class="mermaid">${text}</div>`;
          }
          if (lang === 'functionplot') {
            const id = 'plot-' + Math.random().toString(36).slice(2, 9);
            return `<div class="function-plot" id="${id}" data-plot="${text.replace(/"/g, '&quot;')}"></div>`;
          }
          if (lang && hljs.getLanguage(lang)) {
            const highlighted = hljs.highlight(text, { language: lang }).value;
            return `<pre><code class="hljs language-${lang}">${highlighted}</code></pre>`;
          }
          const escaped = text.replace(/</g, '&lt;').replace(/>/g, '&gt;');
          return `<pre><code>${escaped}</code></pre>`;
        }
      }
    });

    function parsePlotConfig(text) {
      const lines = text.trim().split('\n');
      const fns = [];
      const opts = {};
      for (const line of lines) {
        const trimmed = line.trim();
        if (!trimmed) continue;
        const kvMatch = trimmed.match(/^(\w+)\s*=\s*(.+)$/);
        if (kvMatch) {
          const key = kvMatch[1];
          const val = kvMatch[2].trim();
          if (key === 'xDomain' || key === 'yDomain') {
            const nums = val.replace(/[\[\]]/g, '').split(',').map(Number);
            opts[key] = nums;
          } else if (key === 'title') {
            opts.title = val;
          } else {
            // treat as function definition: fn = expression
            fns.push({ fn: val, color: undefined });
          }
        } else {
          // bare line = function expression
          fns.push({ fn: trimmed });
        }
      }
      return { fns, opts };
    }

    function renderPlots() {
      document.querySelectorAll('.function-plot').forEach(el => {
        const raw = el.getAttribute('data-plot');
        if (!raw) return;
        const { fns, opts } = parsePlotConfig(raw);
        try {
          functionPlot({
            target: '#' + el.id,
            width: Math.min(el.parentElement.offsetWidth, 700),
            height: 400,
            xAxis: opts.xDomain ? { domain: opts.xDomain } : undefined,
            yAxis: opts.yDomain ? { domain: opts.yDomain } : undefined,
            title: opts.title,
            grid: true,
            data: fns.map(f => ({ fn: f.fn, graphType: 'polyline' }))
          });
        } catch (e) {
          el.textContent = 'Plot error: ' + e.message;
        }
      });
    }

    function parseFrontMatter(md) {
      const match = md.match(/^---\n([\s\S]*?)\n---\n([\s\S]*)$/);
      if (!match) return { meta: {}, body: md };
      const meta = {};
      match[1].split('\n').forEach(line => {
        const i = line.indexOf(':');
        if (i > 0) meta[line.slice(0, i).trim()] = line.slice(i + 1).trim();
      });
      return { meta, body: match[2] };
    }

    const file = new URLSearchParams(location.search).get('p');
    if (file) {
      fetch('posts/' + file)
        .then(r => { if (!r.ok) throw new Error(); return r.text(); })
        .catch(() => {
          document.getElementById('content').textContent = 'Post not found.';
          return null;
        })
        .then(md => {
          if (!md) return;
          const { meta, body } = parseFrontMatter(md);
          if (meta.title) document.title = meta.title + ' — maycommit';
          document.getElementById('meta').textContent = [meta.date, meta.title].filter(Boolean).join(' · ');
          document.getElementById('content').innerHTML = marked.parse(body);

          // Render mermaid diagrams
          mermaid.run({ querySelector: '.mermaid' }).catch(() => {});

          // Render function plots
          renderPlots();

          // Render KaTeX math
          renderMathInElement(document.getElementById('content'), {
            delimiters: [
              { left: '$$', right: '$$', display: true },
              { left: '$', right: '$', display: false },
              { left: '\\[', right: '\\]', display: true },
              { left: '\\(', right: '\\)', display: false }
            ],
            throwOnError: false
          });
        });
    }
  </script>
</body>
</html>
